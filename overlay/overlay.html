<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preload" as="image" href="https://pedrohenriqueljs-cyber.github.io/Icones_zn4x/Borda/Borda.png?v=2">
  <style>
    :root {
      color-scheme: dark;
      --menu-r: 0;
      --menu-g: 0;
      --menu-b: 0;
      --corner: 34px;
      --radius: 14px;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    #root {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      background: transparent;
    }

    /* --- Borda --- */
    #border-stage[data-visible="false"] .piece,
    #border-stage[data-visible="false"] .corner,
    #border-stage[data-visible="false"] .outline,
    #border-stage[data-corners-ready="false"] .corner {
      visibility: hidden;
    }

    .piece {
      position: absolute;
      background: rgb(var(--menu-r), var(--menu-g), var(--menu-b));
      transform: translate3d(0, 0, 0);
    }

    .corner {
      position: absolute;
      width: var(--corner);
      height: var(--corner);
      object-fit: fill;
      filter: brightness(0);
      transform-origin: center;
    }

    .corner-tl { transform: rotate(270deg); }
    .corner-tr { transform: rotate(0deg); }
    .corner-br { transform: rotate(90deg); }
    .corner-bl { transform: rotate(180deg); }

    .outline {
      position: absolute;
      border: 1px solid rgba(48, 50, 54, 0.6);
      border-radius: var(--radius);
      box-sizing: border-box;
    }

    /* --- Toggles --- */
    .toggle {
      --w: 42px;
      --h: 20px;
      --pad: 3px;
      position: absolute;
      width: var(--w);
      height: var(--h);
      opacity: 1;
      transform: translate3d(0, 0, 0);
      transition: opacity 80ms ease;
      contain: layout style paint;
    }

    .track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      overflow: hidden;
      background: #1b1b1b;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), inset 0 -5px 10px rgba(0, 0, 0, 0.22);
    }

    .track::before,
    .track::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      transition: opacity 140ms cubic-bezier(0.22, 1, 0.36, 1);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent), #1b1b1b;
    }

    .track::after { opacity: 0; }
    .toggle.is-on .track::before { opacity: 0; }
    .toggle.is-on .track::after { opacity: 1; }

    .knob {
      position: absolute;
      top: var(--pad);
      left: var(--pad);
      width: calc(var(--h) - (var(--pad) * 2));
      height: calc(var(--h) - (var(--pad) * 2));
      border-radius: 50%;
      background: radial-gradient(circle at 35% 28%, #fff 0, #eef2ff 62%, #c7d2fe 100%);
      box-shadow: 0 1px 1px rgba(255, 255, 255, 0.75) inset, 0 2px 7px rgba(0, 0, 0, 0.36);
      transform: translate3d(0, 0, 0);
      transition: transform 160ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .toggle.is-on .knob {
      transform: translate3d(calc(var(--w) - var(--h)), 0, 0);
    }

    /* --- Icones --- */
    .category-icon {
      position: absolute;
      width: 16px;
      height: 16px;
      background: #4876ff;
      opacity: 0;
      transform: translate3d(0, 0, 0);
      transition: opacity 60ms ease, background-color 60ms ease;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-size: contain;
      mask-size: contain;
      contain: layout style paint;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="border-stage" data-visible="false" data-corners-ready="false">
      <div id="center" class="piece"></div>
      <div id="left" class="piece"></div>
      <div id="right" class="piece"></div>
      <img id="tl" class="corner corner-tl" src="https://pedrohenriqueljs-cyber.github.io/Icones_zn4x/Borda/Borda.png?v=2" alt="" decoding="async">
      <img id="tr" class="corner corner-tr" src="https://pedrohenriqueljs-cyber.github.io/Icones_zn4x/Borda/Borda.png?v=2" alt="" decoding="async">
      <img id="br" class="corner corner-br" src="https://pedrohenriqueljs-cyber.github.io/Icones_zn4x/Borda/Borda.png?v=2" alt="" decoding="async">
      <img id="bl" class="corner corner-bl" src="https://pedrohenriqueljs-cyber.github.io/Icones_zn4x/Borda/Borda.png?v=2" alt="" decoding="async">
      <div id="outline" class="outline"></div>
    </div>
    <div id="toggle-stage"></div>
    <div id="icon-stage"></div>
  </div>

  <script>
    const BORDER_IMG = "https://pedrohenriqueljs-cyber.github.io/Icones_zn4x/Borda/Borda.png?v=2";
    const borderStage = document.getElementById("border-stage");
    const center = document.getElementById("center");
    const left = document.getElementById("left");
    const right = document.getElementById("right");
    const outline = document.getElementById("outline");
    const corners = {
      tl: document.getElementById("tl"),
      tr: document.getElementById("tr"),
      br: document.getElementById("br"),
      bl: document.getElementById("bl")
    };
    const toggleStage = document.getElementById("toggle-stage");
    const iconStage = document.getElementById("icon-stage");

    let cornersReady = false;

    function markCornersReady() {
      if (cornersReady) return;
      cornersReady = true;
      borderStage.dataset.cornersReady = "true";
    }

    (function preloadCorners() {
      let loaded = 0;
      const need = 4;
      const onDone = () => {
        loaded += 1;
        if (loaded >= need) markCornersReady();
      };

      Object.values(corners).forEach((img) => {
        if (img.complete && img.naturalWidth > 0) {
          onDone();
          return;
        }
        img.addEventListener("load", onDone, { once: true });
        img.addEventListener("error", onDone, { once: true });
      });

      const probe = new Image();
      probe.decoding = "async";
      probe.src = BORDER_IMG;
      if (probe.complete) {
        markCornersReady();
      } else {
        probe.addEventListener("load", markCornersReady, { once: true });
        probe.addEventListener("error", markCornersReady, { once: true });
      }
    })();

    function px(v) {
      return `${Math.round(Number(v) || 0)}px`;
    }

    function place(el, x, y, w, h) {
      el.style.left = px(x);
      el.style.top = px(y);
      el.style.width = px(Math.max(0, w));
      el.style.height = px(Math.max(0, h));
    }

    function setMenuShell(data) {
      if (!data) {
        borderStage.dataset.visible = "false";
        return;
      }

      const x = Number(data.x) || 0;
      const y = Number(data.y) || 0;
      const w = Math.max(0, Number(data.w) || 0);
      const h = Math.max(0, Number(data.h) || 0);
      const corner = Math.max(8, Number(data.corner) || 34);
      const radius = Math.max(0, Number(data.radius) || 14);
      const color = Array.isArray(data.color) ? data.color : [0, 0, 0];

      document.documentElement.style.setProperty("--menu-r", Number(color[0]) || 0);
      document.documentElement.style.setProperty("--menu-g", Number(color[1]) || 0);
      document.documentElement.style.setProperty("--menu-b", Number(color[2]) || 0);
      document.documentElement.style.setProperty("--corner", px(corner));
      document.documentElement.style.setProperty("--radius", px(radius));

      place(center, x + corner, y, w - corner * 2, h);
      place(left, x, y + corner, corner, h - corner * 2);
      place(right, x + w - corner, y + corner, corner, h - corner * 2);
      place(corners.tl, x, y, corner, corner);
      place(corners.tr, x + w - corner, y, corner, corner);
      place(corners.br, x + w - corner, y + h - corner, corner, corner);
      place(corners.bl, x, y + h - corner, corner, corner);
      place(outline, x, y, w, h);

      borderStage.dataset.visible = w > 0 && h > 0 ? "true" : "false";
    }

    const toggles = new Map();
    const toggleTimers = new Map();

    function applyToggle(item, fallbackIndex) {
      const id = String(item.id ?? fallbackIndex);
      let node = toggles.get(id);

      if (!node) {
        node = document.createElement("div");
        node.className = "toggle";
        node.dataset.id = id;
        const track = document.createElement("div");
        track.className = "track";
        const knob = document.createElement("div");
        knob.className = "knob";
        node.append(track, knob);
        toggleStage.appendChild(node);
        toggles.set(id, node);
      }

      const timer = toggleTimers.get(id);
      if (timer) {
        clearTimeout(timer);
        toggleTimers.delete(id);
      }

      const width = Math.max(18, Number(item.w ?? item.width ?? 42));
      const height = Math.max(12, Number(item.h ?? item.height ?? 20));
      const x = Number(item.x ?? 0);
      const y = Number(item.y ?? 0);
      const opacity = Math.max(0, Math.min(1, Number(item.alpha ?? 1)));
      const pad = Math.max(2, Math.min(4, Math.round(height * 0.16)));

      node.style.setProperty("--w", `${width}px`);
      node.style.setProperty("--h", `${height}px`);
      node.style.setProperty("--pad", `${pad}px`);
      node.style.width = `${width}px`;
      node.style.height = `${height}px`;
      node.style.opacity = String(opacity);
      node.style.transform = `translate3d(${Math.round(x)}px, ${Math.round(y)}px, 0)`;
      node.classList.toggle("is-on", Boolean(item.state));
      return id;
    }

    function setToggles(items) {
      const active = new Set();
      const list = Array.isArray(items) ? items : [];

      for (let i = 0; i < list.length; i += 1) {
        active.add(applyToggle(list[i], i));
      }

      for (const [id, node] of toggles) {
        if (active.has(id) || toggleTimers.has(id)) continue;
        node.style.opacity = "0";
        toggleTimers.set(id, setTimeout(() => {
          toggleTimers.delete(id);
          if (toggles.get(id) === node) {
            node.remove();
            toggles.delete(id);
          }
        }, 32));
      }
    }

    const icons = new Map();
    const iconTimers = new Map();

    function clamp(v, min, max) {
      return Math.min(max, Math.max(min, Number(v) || 0));
    }

    function iconUrl(name) {
      return `${encodeURIComponent(String(name || ""))}.png`;
    }

    function setIcons(items) {
      const alive = new Set();
      const list = Array.isArray(items) ? items : [];

      for (const item of list) {
        const id = String(item.id || item.name || "");
        if (!id) continue;

        alive.add(id);
        const timer = iconTimers.get(id);
        if (timer) {
          clearTimeout(timer);
          iconTimers.delete(id);
        }

        let el = icons.get(id);
        if (!el) {
          el = document.createElement("span");
          el.className = "category-icon";
          iconStage.appendChild(el);
          icons.set(id, el);
        }

        const size = Math.max(8, Number(item.size) || 16);
        const color = Array.isArray(item.color) ? item.color : [72, 118, 255];
        const src = iconUrl(item.name || id);

        el.style.left = px(item.x);
        el.style.top = px(item.y);
        el.style.width = px(size);
        el.style.height = px(size);
        el.style.backgroundColor = `rgb(${clamp(color[0], 0, 255)}, ${clamp(color[1], 0, 255)}, ${clamp(color[2], 0, 255)})`;
        el.style.opacity = clamp(item.alpha ?? 1, 0, 1).toFixed(2);
        el.style.webkitMaskImage = `url("${src}")`;
        el.style.maskImage = `url("${src}")`;
      }

      for (const [id, el] of icons) {
        if (alive.has(id) || iconTimers.has(id)) continue;
        el.style.opacity = "0";
        iconTimers.set(id, setTimeout(() => {
          el.remove();
          icons.delete(id);
          iconTimers.delete(id);
        }, 32));
      }
    }

    function applyFrame(data) {
      setMenuShell(data.shell);
      setToggles(data.toggles);
      setIcons(data.icons);
    }

    window.__applyFrame = applyFrame;

    window.addEventListener("message", (event) => {
      let data = event.data;
      if (typeof data === "string") {
        try { data = JSON.parse(data); } catch (_) { data = {}; }
      }
      data = data || {};

      if (data.action === "frame") {
        applyFrame(data);
        return;
      }

      if (data.action === "setMenuShell") {
        setMenuShell(data);
        return;
      }

      if (data.action === "setToggles") {
        setToggles(data.toggles);
        return;
      }

      if (data.action === "setCategoryIcons") {
        setIcons(data.icons || []);
      }
    });
  </script>
</body>
</html>
