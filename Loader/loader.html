<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .zn4x-wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    .zn4x-card {
      width: 320px;
      overflow: hidden;
      border: 1px solid #333;
      border-radius: 10px;
      background: #1a1a1a;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      animation: cardIn 520ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .zn4x-titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      border-bottom: 1px solid #2a2a2a;
    }

    .zn4x-title {
      font-size: 15px;
      font-weight: 700;
      color: #e8e8e8;
      letter-spacing: 0.02em;
    }

    .zn4x-version {
      padding: 2px 7px;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      background: #2a2a2a;
      color: #888;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .zn4x-body {
      padding: 14px 16px 16px;
      border-bottom: 1px solid #2a2a2a;
    }

    .zn4x-body-title {
      margin: 0 0 5px;
      color: #ddd;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .zn4x-body-desc {
      margin: 0;
      color: #888;
      font-size: 11px;
      line-height: 1.55;
      letter-spacing: 0.01em;
    }

    .zn4x-footer {
      padding: 10px 16px 14px;
    }

    .zn4x-progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .zn4x-loading-label,
    .zn4x-percent {
      color: #aaa;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .zn4x-loading-label {
      color: #888;
      font-weight: 500;
    }

    .zn4x-track {
      width: 100%;
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: #2e2e2e;
    }

    .zn4x-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: #4876ff;
      transition: width 240ms cubic-bezier(0.22, 1, 0.36, 1), box-shadow 240ms ease;
    }

    .zn4x-card.complete .zn4x-bar {
      box-shadow: 0 0 12px rgba(72, 118, 255, 0.72);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="zn4x-wrapper">
    <div class="zn4x-card" id="card">
      <div class="zn4x-titlebar">
        <span class="zn4x-title">ZN4X Menu</span>
        <span class="zn4x-version">1.0.0</span>
      </div>
      <div class="zn4x-body">
        <p class="zn4x-body-title">Carregando Imagens</p>
        <p class="zn4x-body-desc">Estamos carregando os arquivos necessarios para a utilizacao do ZN4X Menu</p>
      </div>
      <div class="zn4x-footer">
        <div class="zn4x-progress-row">
          <span class="zn4x-loading-label" id="label">Carregando...</span>
          <span class="zn4x-percent" id="pct">0%</span>
        </div>
        <div class="zn4x-track">
          <div class="zn4x-bar" id="bar"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const card = document.getElementById("card");
    const bar = document.getElementById("bar");
    const pct = document.getElementById("pct");
    const label = document.getElementById("label");

    let current = 0;
    let target = 0;
    let raf = 0;

    function clamp(value, min, max) {
      return Math.min(Math.max(Number(value) || 0, min), max);
    }

    function render() {
      const rounded = Math.round(current);
      bar.style.width = rounded + "%";
      pct.textContent = rounded + "%";
      card.classList.toggle("complete", rounded >= 100);
      label.textContent = rounded >= 100 ? "Pronto" : "Carregando...";
    }

    function tick() {
      current += (target - current) * 0.22;

      if (Math.abs(target - current) < 0.15) {
        current = target;
      }

      render();

      if (current !== target) {
        raf = requestAnimationFrame(tick);
      } else {
        raf = 0;
      }
    }

    function setProgress(value) {
      target = clamp(value, 0, 100);

      if (!raf) {
        raf = requestAnimationFrame(tick);
      }
    }

    function parsePayload(data) {
      if (typeof data === "string") {
        try {
          return JSON.parse(data);
        } catch (_) {
          return {};
        }
      }

      return data || {};
    }

    window.addEventListener("message", function(event) {
      const data = parsePayload(event.data);

      if (data.action === "setLoaderProgress") {
        setProgress(data.complete ? 100 : data.progress);
      }
    });

    function idleProgress() {
      if (target < 92) {
        setProgress(target + 1.25);
      }

      setTimeout(idleProgress, 140);
    }

    render();
    setTimeout(idleProgress, 220);
  </script>
</body>
</html>
