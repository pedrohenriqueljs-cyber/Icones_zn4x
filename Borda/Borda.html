<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
      background: transparent;
    }
  </style>
</head>
<body>
  <canvas id="shell"></canvas>

  <script>
    const canvas = document.getElementById("shell");
    const ctx = canvas.getContext("2d");
    let shell = null;

    function readMessage(data) {
      if (typeof data !== "string") {
        return data || {};
      }

      try {
        return JSON.parse(data);
      } catch (error) {
        return {};
      }
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, Number(value) || 0));
    }

    function colorToCss(color) {
      const list = Array.isArray(color) ? color : [0, 0, 0];
      return `rgb(${clamp(list[0], 0, 255)}, ${clamp(list[1], 0, 255)}, ${clamp(list[2], 0, 255)})`;
    }

    function resizeCanvas() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const width = Math.max(1, Math.round(window.innerWidth * dpr));
      const height = Math.max(1, Math.round(window.innerHeight * dpr));

      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function roundedRectPath(x, y, w, h, radius) {
      const r = Math.min(radius, w / 2, h / 2);

      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    function draw() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      if (!shell) {
        return;
      }

      const x = Math.round(Number(shell.x) || 0);
      const y = Math.round(Number(shell.y) || 0);
      const w = Math.round(Number(shell.w) || 0);
      const h = Math.round(Number(shell.h) || 0);
      const radius = Math.max(0, Number(shell.radius) || 14);

      if (w <= 0 || h <= 0) {
        return;
      }

      ctx.fillStyle = colorToCss(shell.color);
      roundedRectPath(x, y, w, h, radius);
      ctx.fill();

      ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
      ctx.lineWidth = 1;
      roundedRectPath(x + 0.5, y + 0.5, w - 1, h - 1, radius);
      ctx.stroke();
    }

    function setMenuShell(data) {
      shell = data;
      draw();
    }

    window.__setMenuShell = setMenuShell;
    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("message", (event) => {
      const data = readMessage(event.data);
      if (data.action === "setMenuShell") {
        setMenuShell(data);
      }
    });

    resizeCanvas();

    if (new URLSearchParams(window.location.search).has("demo")) {
      setMenuShell({
        x: 40,
        y: 40,
        w: Math.max(260, window.innerWidth - 80),
        h: Math.max(220, window.innerHeight - 80),
        radius: 14,
        color: [0, 0, 0]
      });
    }
  </script>
</body>
</html>
