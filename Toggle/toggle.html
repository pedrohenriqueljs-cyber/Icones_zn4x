<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { color-scheme: dark; }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: transparent;
        }

        #stage {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            background: transparent;
        }

        .toggle {
            --w: 42px;
            --h: 20px;
            --pad: 3px;
            position: absolute;
            width: var(--w);
            height: var(--h);
            opacity: 1;
            transform: translate3d(0, 0, 0);
            transition: opacity 80ms ease;
            contain: layout style paint;
        }

        .track {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            overflow: hidden;
            background: #1b1b1b;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), inset 0 -5px 10px rgba(0, 0, 0, 0.22);
        }

        .track::before,
        .track::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            transition: opacity 140ms cubic-bezier(0.22, 1, 0.36, 1);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent), #1b1b1b;
        }

        .track::after { opacity: 0; }
        .toggle.is-on .track::before { opacity: 0; }
        .toggle.is-on .track::after { opacity: 1; }

        .knob {
            position: absolute;
            top: var(--pad);
            left: var(--pad);
            width: calc(var(--h) - (var(--pad) * 2));
            height: calc(var(--h) - (var(--pad) * 2));
            border-radius: 50%;
            background: radial-gradient(circle at 35% 28%, #fff 0, #eef2ff 62%, #c7d2fe 100%);
            box-shadow: 0 1px 1px rgba(255, 255, 255, 0.75) inset, 0 2px 7px rgba(0, 0, 0, 0.36);
            transform: translate3d(0, 0, 0);
            transition: transform 160ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        .toggle.is-on .knob {
            transform: translate3d(calc(var(--w) - var(--h)), 0, 0);
        }
    </style>
</head>
<body>
    <div id="stage"></div>

    <script>
        const stage = document.getElementById("stage");
        const toggles = new Map();
        const removalTimers = new Map();

        function readMessage(data) {
            if (typeof data !== "string") return data || {};
            try { return JSON.parse(data); } catch (_) { return {}; }
        }

        function createToggle(id) {
            const toggle = document.createElement("div");
            const track = document.createElement("div");
            const knob = document.createElement("div");
            toggle.className = "toggle";
            toggle.dataset.id = id;
            track.className = "track";
            knob.className = "knob";
            toggle.append(track, knob);
            stage.appendChild(toggle);
            toggles.set(id, toggle);
            return toggle;
        }

        function applyToggle(item, fallbackIndex) {
            const id = String(item.id ?? fallbackIndex);
            const width = Math.max(18, Number(item.w ?? item.width ?? 42));
            const height = Math.max(12, Number(item.h ?? item.height ?? 20));
            const x = Number(item.x ?? 0);
            const y = Number(item.y ?? 0);
            const opacity = Math.max(0, Math.min(1, Number(item.alpha ?? 1)));
            const pad = Math.max(2, Math.min(4, Math.round(height * 0.16)));
            const toggle = toggles.get(id) || createToggle(id);
            const pendingRemoval = removalTimers.get(id);

            if (pendingRemoval) {
                clearTimeout(pendingRemoval);
                removalTimers.delete(id);
            }

            toggle.style.setProperty("--w", `${width}px`);
            toggle.style.setProperty("--h", `${height}px`);
            toggle.style.setProperty("--pad", `${pad}px`);
            toggle.style.width = `${width}px`;
            toggle.style.height = `${height}px`;
            toggle.style.opacity = opacity;
            toggle.style.transform = `translate3d(${Math.round(x)}px, ${Math.round(y)}px, 0)`;
            toggle.classList.toggle("is-on", Boolean(item.state));
            return id;
        }

        function clearToggles() {
            removalTimers.forEach((timer) => clearTimeout(timer));
            removalTimers.clear();
            toggles.forEach((node) => node.remove());
            toggles.clear();
        }

        function setToggles(items) {
            const active = new Set();
            const list = Array.isArray(items) ? items : [];

            list.forEach((item, index) => {
                active.add(applyToggle(item, index));
            });

            toggles.forEach((node, id) => {
                if (active.has(id) || removalTimers.has(id)) return;
                node.style.opacity = "0";
                removalTimers.set(id, setTimeout(() => {
                    removalTimers.delete(id);
                    if (toggles.get(id) === node) {
                        node.remove();
                        toggles.delete(id);
                    }
                }, 32));
            });
        }

        window.setToggles = setToggles;

        window.addEventListener("message", (event) => {
            const data = readMessage(event.data);
            if (data.action === "setToggles") setToggles(data.toggles);
            if (data.action === "clearToggles") clearToggles();
        });
    </script>
</body>
</html>
