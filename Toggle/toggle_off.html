<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle {
      position: relative;
      width: 52px;
      height: 28px;
      border: 0;
      outline: 0;
      border-radius: 999px;
      background: #1b1b1b;
      box-shadow: none;
      appearance: none;
      -webkit-appearance: none;
    }

    .toggle::after {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <button class="toggle" aria-label="Toggle desligado"></button>
</body>
</html>
