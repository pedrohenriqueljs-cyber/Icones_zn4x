<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: #1b1b1b;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100vh;
  }
  .toggle {
    position: relative;
    width: 52px;
    height: 28px;
    background-color: #3a3a3a;
    border-radius: 14px;
    cursor: pointer;
    outline: none;
    border: none;
    box-shadow: none;
    -webkit-appearance: none;
    appearance: none;
    transition: background-color 0.25s ease;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    background-color: #ffffff;
    border-radius: 50%;
    transition: left 0.25s ease;
    box-shadow: none;
  }
</style>
</head>
<body>
  <button class="toggle" aria-label="Toggle desligado"></button>
</body>
</html>
