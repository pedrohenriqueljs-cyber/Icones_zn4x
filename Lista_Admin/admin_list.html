<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin List</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: Arial, Helvetica, sans-serif;
  }

  .admin-list {
    position: absolute;
    left: 28px;
    top: 34px;
    width: 186px;
    color: #f4f6ff;
    border-radius: 5px;
    overflow: hidden;
    user-select: none;
    filter: drop-shadow(0 2px 3px rgba(0, 0, 0, .55));
  }

  .admin-header {
    height: 21px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    background: linear-gradient(180deg, #24356d 0%, #17264e 100%);
    border: 1px solid rgba(93, 119, 196, .70);
    border-bottom: 0;
    border-radius: 5px 5px 0 0;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, .10);
  }

  .admin-title {
    font-size: 11.5px;
    font-weight: 700;
    line-height: 1;
    color: rgba(255, 255, 255, .96);
    text-shadow: 0 1px 1px rgba(0, 0, 0, .85);
  }

  .admin-body {
    background: rgba(23, 26, 38, .50);
    border: 1px solid rgba(75, 85, 121, .62);
    border-top: 0;
    border-radius: 0 0 5px 5px;
    overflow: hidden;
    backdrop-filter: blur(1.5px);
  }

  .admin-row {
    height: 21px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px 0 10px;
    background: rgba(48, 50, 63, .35);
    border-bottom: 1px solid rgba(0, 0, 0, .20);
    font-size: 11.5px;
    font-weight: 500;
    line-height: 1;
    text-shadow: 0 1px 1px rgba(0, 0, 0, .90);
  }

  .admin-row:last-child {
    border-bottom: 0;
  }

  .admin-name {
    color: rgba(247, 249, 255, .96);
    max-width: 125px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  .admin-distance {
    color: rgba(235, 239, 255, .94);
    font-weight: 600;
    margin-left: 10px;
  }
</style>
</head>
<body>
  <div class="admin-list">
    <div class="admin-header">
      <span class="admin-title">Administratores</span>
    </div>

    <div class="admin-body" id="adminBody"></div>
  </div>

  <script>
    const adminBody = document.getElementById('adminBody');
    const previewAdmins = [
      { name: 'Kby', distance: 354 },
      { name: 'Luis', distance: 387 }
    ];

    function createAdminRow(admin) {
      const row = document.createElement('div');
      const name = document.createElement('span');
      const distance = document.createElement('span');

      row.className = 'admin-row';
      name.className = 'admin-name';
      distance.className = 'admin-distance';

      name.textContent = admin.name || 'Player';
      distance.textContent = typeof admin.distance === 'number'
        ? `${Math.round(admin.distance)}m`
        : (admin.distance || '');

      row.appendChild(name);
      row.appendChild(distance);
      return row;
    }

    function setAdmins(admins) {
      const list = Array.isArray(admins) ? admins.slice(0, 10) : [];
      adminBody.replaceChildren();

      if (list.length === 0) {
        adminBody.appendChild(createAdminRow({ name: 'Nenhum admin', distance: '' }));
        return;
      }

      list.forEach((admin) => adminBody.appendChild(createAdminRow(admin)));
    }

    window.setAdmins = setAdmins;

    window.addEventListener('message', (event) => {
      const data = event.data || {};
      if (data.type === 'adminList' || data.action === 'adminList') {
        setAdmins(data.admins || data.players || []);
      }
    });

    setAdmins(previewAdmins);
  </script>
</body>
</html>
