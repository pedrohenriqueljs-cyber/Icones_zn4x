<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Slider Azul</title>

<style>
    body {
        margin: 0;
        background: transparent;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
    }

    .slider-box {
        position: relative;
        width: 260px;
        padding-top: 25px;
    }

    .value {
        position: absolute;
        top: 0;
        left: 0;
        transform: translateX(-50%);
        color: white;
        font-size: 13px;
        pointer-events: none;
        text-shadow: 0 1px 4px black;
    }

    input[type="range"] {
        width: 100%;
        appearance: none;
        height: 6px;
        border-radius: 10px;
        background: transparent;
        outline: none;
    }

    input[type="range"]::-webkit-slider-runnable-track {
        height: 6px;
        border-radius: 10px;
        background: linear-gradient(
            to right,
            #4876ff 0%,
            #4876ff var(--progress),
            #1b1b1b var(--progress),
            #1b1b1b 100%
        );
    }

    input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 14px;
        height: 14px;
        background: #ffffff;
        border-radius: 50%;
        cursor: pointer;
        margin-top: -4px;
        box-shadow: 0 0 6px rgba(72, 118, 255, 0.9);
    }

    input[type="range"]::-moz-range-track {
        height: 6px;
        border-radius: 10px;
        background: #1b1b1b;
    }

    input[type="range"]::-moz-range-progress {
        height: 6px;
        border-radius: 10px;
        background: #4876ff;
    }

    input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        background: #ffffff;
        border-radius: 50%;
        cursor: pointer;
        border: none;
        box-shadow: 0 0 6px rgba(72, 118, 255, 0.9);
    }
</style>
</head>

<body>

<div class="slider-box">
    <div class="value" id="sliderValue">123</div>
    <input type="range" id="slider" min="0" max="200" value="123">
</div>

<script>
    const slider = document.getElementById("slider");
    const value = document.getElementById("sliderValue");

    function updateSlider() {
        const min = Number(slider.min);
        const max = Number(slider.max);
        const val = Number(slider.value);

        const percent = ((val - min) / (max - min)) * 100;

        slider.style.setProperty("--progress", percent + "%");
        value.textContent = val;
        value.style.left = percent + "%";
    }

    slider.addEventListener("input", updateSlider);
    updateSlider();
</script>

</body>
</html>
