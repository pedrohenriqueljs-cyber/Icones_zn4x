<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: dark;
      --accent: #4876ff;
      --text: #f4f6fb;
      --muted: #c8ccd6;
      --card: rgba(38, 40, 44, 0.96);
      --card-hover: rgba(48, 50, 54, 0.98);
      --line: rgba(255, 255, 255, 0.12);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      user-select: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
    }

    .weapon {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      overflow: hidden;
      transform-origin: center;
      will-change: transform, opacity;
      transition: opacity 90ms linear;
    }

    .demo .weapon {
      border-radius: 9px;
      background: var(--card);
      box-shadow: inset 0 1px 0 var(--line);
    }

    .demo .weapon.is-hover {
      background: var(--card-hover);
    }

    .demo .weapon.is-hover::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 4px;
      height: 3px;
      border-radius: 999px;
      background: var(--accent);
      opacity: 0.88;
    }

    .weapon-img {
      position: absolute;
      left: 50%;
      top: 45%;
      max-width: calc(100% - 18px);
      max-height: 74px;
      object-fit: contain;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 5px 5px rgba(0, 0, 0, 0.32));
      pointer-events: none;
    }

    .label {
      position: absolute;
      left: 4px;
      right: 4px;
      bottom: 13px;
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 14px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0;
    }

    .demo .label,
    .show-labels .label {
      display: block;
    }
  </style>
</head>
<body>
  <div id="stage"></div>

  <script>
    const DEFAULT_WEAPONS = [
      { label: "Knife", hash: "WEAPON_KNIFE", id: "weapon_knife" },
      { label: "Hammer", hash: "WEAPON_HAMMER", id: "weapon_hammer" },
      { label: "Bottle", hash: "WEAPON_BOTTLE", id: "weapon_bottle" },
      { label: "Bat", hash: "WEAPON_BAT", id: "weapon_bat" },
      { label: "Pistol Mk II", hash: "WEAPON_PISTOL_MK2", id: "weapon_pistol_mk2" },
      { label: "Double Action", hash: "WEAPON_DOUBLEACTION", id: "weapon_doubleaction" },
      { label: "Pistol .50", hash: "WEAPON_PISTOL50", id: "weapon_pistol50" },
      { label: "Revolver Mk II", hash: "WEAPON_REVOLVER_MK2", id: "weapon_revolver_mk2" },
      { label: "Machine Pistol", hash: "WEAPON_MACHINEPISTOL", id: "weapon_machinepistol" },
      { label: "Assault SMG", hash: "WEAPON_ASSAULTSMG", id: "weapon_assaultsmg" },
      { label: "Micro SMG", hash: "WEAPON_MICROSMG", id: "weapon_microsmg" },
      { label: "Pump Shotgun Mk II", hash: "WEAPON_PUMPSHOTGUN_MK2", id: "weapon_pumpshotgun_mk2" },
      { label: "Combat Shotgun", hash: "WEAPON_COMBATSHOTGUN", id: "weapon_combatshotgun" },
      { label: "Bullpup Shotgun", hash: "WEAPON_BULLPUPSHOTGUN", id: "weapon_bullpupshotgun" },
      { label: "Assault Rifle Mk II", hash: "WEAPON_ASSAULTRIFLE_MK2", id: "weapon_assaultrifle_mk2" },
      { label: "Special Carbine Mk II", hash: "WEAPON_SPECIALCARBINE_MK2", id: "weapon_specialcarbine_mk2" },
      { label: "Carbine Rifle Mk II", hash: "WEAPON_CARBINERIFLE_MK2", id: "weapon_carbinerifle_mk2" },
      { label: "Bullpup Rifle Mk II", hash: "WEAPON_BULLPUPRIFLE_MK2", id: "weapon_bullpuprifle_mk2" },
      { label: "RPG", hash: "WEAPON_RPG", id: "weapon_rpg" },
      { label: "Grenade Launcher", hash: "WEAPON_GRENADELAUNCHER", id: "weapon_grenadelauncher" },
      { label: "Minigun", hash: "WEAPON_MINIGUN", id: "weapon_minigun" },
      { label: "Railgun XM3", hash: "WEAPON_RAILGUNXM3", id: "weapon_railgunxm3" }
    ];

    const stage = document.getElementById("stage");
    const params = new URLSearchParams(location.search);
    const nodes = new Map();
    let currentWeapons = DEFAULT_WEAPONS;

    function imagePath(id) {
      return `${id}.png`;
    }

    function makeSpawnName(weapon) {
      return (weapon.hash || weapon.id || "").toLowerCase();
    }

    function ensureNode(weapon, index) {
      const key = weapon.id || weapon.hash || `weapon_${index}`;
      let node = nodes.get(key);
      if (node) return node;

      const card = document.createElement("div");
      card.className = "weapon";
      card.dataset.key = key;

      const img = document.createElement("img");
      img.className = "weapon-img";
      img.alt = weapon.label || key;
      img.draggable = false;
      img.src = imagePath(weapon.id || makeSpawnName(weapon));

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = makeSpawnName(weapon);

      card.append(img, label);
      stage.appendChild(card);
      node = { card, img, label };
      nodes.set(key, node);
      return node;
    }

    function setWeapons(list) {
      if (!Array.isArray(list) || list.length === 0) return;
      currentWeapons = list.map((weapon) => ({
        label: weapon.label || weapon.id || weapon.hash || "",
        hash: weapon.hash || "",
        id: weapon.id || (weapon.hash || "").toLowerCase()
      }));

      const validKeys = new Set(currentWeapons.map((weapon) => weapon.id || weapon.hash));
      for (const [key, node] of nodes) {
        if (!validKeys.has(key)) {
          node.card.remove();
          nodes.delete(key);
        }
      }
    }

    function render(data = {}) {
      const cardW = Number(data.cardW) || 110;
      const cardH = Number(data.cardH) || 130;
      const spacing = Number(data.spacing) || 12;
      const scrollX = Number(data.scrollX) || 0;
      const itemY = Number(data.itemY) || 8;
      const alpha = Math.max(0, Math.min(1, Number(data.alpha ?? 1)));
      const hoverIndex = Number(data.hoverIndex) || 0;
      const showLabels = data.showLabels === true || params.get("labels") === "1";

      document.body.classList.toggle("show-labels", showLabels);

      const viewportW = stage.clientWidth || Number(data.viewportW) || innerWidth;
      const overscan = 40;

      currentWeapons.forEach((weapon, index) => {
        const node = ensureNode(weapon, index);
        const x = index * (cardW + spacing) - scrollX;
        const visible = x + cardW > -overscan && x < viewportW + overscan;

        node.card.style.width = `${cardW}px`;
        node.card.style.height = `${cardH}px`;
        node.card.style.transform = `translate3d(${Math.round(x)}px, ${Math.round(itemY)}px, 0)`;
        node.card.style.opacity = visible ? String(alpha) : "0";
        node.card.style.visibility = visible ? "visible" : "hidden";
        node.card.classList.toggle("is-hover", hoverIndex === index + 1);
        node.label.textContent = makeSpawnName(weapon);
      });
    }

    function startDemo() {
      document.body.classList.add("demo");
      render({ showLabels: true, itemY: 8 });
      let target = 0;
      let current = 0;

      window.addEventListener("wheel", (event) => {
        target = Math.max(0, Math.min(1900, target + event.deltaY));
      }, { passive: true });

      function tick(time) {
        if (!params.has("static")) {
          target = (Math.sin(time / 1800) + 1) * 0.5 * 1700;
        }
        current += (target - current) * 0.12;
        const hoverIndex = Math.floor(current / 122) % currentWeapons.length + 1;
        render({ scrollX: current, showLabels: true, itemY: 8, hoverIndex });
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.action !== "setWeaponRoulette") return;
      if (Array.isArray(data.weapons)) {
        setWeapons(data.weapons);
      }
      render(data);
    });

    window.addEventListener("resize", () => render());

    if (params.get("demo") === "1") {
      startDemo();
    } else {
      render({ itemY: 8, alpha: 0 });
    }
  </script>
</body>
</html>
