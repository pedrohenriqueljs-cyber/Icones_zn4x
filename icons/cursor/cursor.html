<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
    }

    #cursor {
      position: absolute;
      left: 0;
      top: 0;
      width: 24px;
      height: 24px;
      object-fit: contain;
      transform-origin: 3px 3px;
      transition: transform 80ms ease, opacity 80ms ease, filter 80ms ease;
      will-change: transform, opacity, filter;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.45));
      opacity: 1;
    }

    body.pressed #cursor {
      transform: scale(0.92);
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.5));
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <div id="stage">
    <img id="cursor" src="cursor_icon.png" alt="">
  </div>

  <script>
    window.addEventListener("message", function(event) {
      const data = event.data || {};
      if (data.action !== "setCursor") return;
      document.body.classList.toggle("pressed", data.pressed === true);
    });
  </script>
</body>
</html>
