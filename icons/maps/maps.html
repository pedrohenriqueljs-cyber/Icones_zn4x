<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .map-icon {
      width: 100%;
      height: 100%;
      background: #fff;
      -webkit-mask: url("maps.png") center / contain no-repeat;
      mask: url("maps.png") center / contain no-repeat;
    }
  </style>
</head>
<body>
  <span class="map-icon"></span>
</body>
</html>
